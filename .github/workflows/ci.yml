name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Compile check (core modules)
        run: |
          python -m py_compile api/main.py
          python -m py_compile config/settings.py
          python -m py_compile src/database/connection.py
          python -m py_compile src/utils/cache.py
          python -m py_compile src/utils/search.py
          python -m py_compile fetchers/intraday.py
          python -m py_compile src/telemetry/__init__.py
          python -m py_compile src/telemetry/models.py
          python -m py_compile src/telemetry/recorder.py
      - name: Run tests
        run: pytest tests/ -v --tb=short -x || true
      - name: Check response_model coverage
        run: |
          total=$(grep -c '@app\.\(get\|post\|put\|delete\)' api/main.py || true)
          covered=$(grep -c 'response_model=' api/main.py || true)
          echo "Response model coverage: $covered / $total endpoints"
          if [ "$total" -gt 0 ]; then
            pct=$((covered * 100 / total))
            echo "Coverage: ${pct}%"
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Lint
        run: npx next lint || true
      - name: Tests
        run: npx vitest run || true
