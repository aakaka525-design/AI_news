services:
  trendradar:
    image: wantcat/trendradar:latest
    container_name: trendradar
    restart: unless-stopped
    networks:
      - backend_net
    volumes:
      - ./trendradar/config:/app/config:ro
      - trendradar_output:/app/output
    environment:
      - TZ=Asia/Shanghai
      - ENABLE_CRAWLER=${ENABLE_CRAWLER:-true}
      - ENABLE_NOTIFICATION=${ENABLE_NOTIFICATION:-true}
      - REPORT_MODE=${REPORT_MODE:-incremental}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-*/30 * * * *}
      - RUN_MODE=${RUN_MODE:-cron}
      - IMMEDIATE_RUN=${IMMEDIATE_RUN:-true}
      # AI 分析配置
      - AI_ANALYSIS_ENABLED=${AI_ANALYSIS_ENABLED:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Generic Webhook 推送到 Dashboard
      - GENERIC_WEBHOOK_URL=http://dashboard:8000/webhook/receive
      - "GENERIC_WEBHOOK_TEMPLATE={\"title\": \"{title}\", \"content\": \"{content}\"}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - dashboard

  dashboard:
    build: .
    container_name: ainews_dashboard
    restart: unless-stopped
    networks:
      - frontend_net
      - backend_net
      - data_net
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=postgresql://ainews:${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}@postgres:5432/ainews
      - NEWS_DATABASE_URL=postgresql://ainews:${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}@postgres:5432/ainews
      - AI_ANALYSIS_ENABLED=${AI_ANALYSIS_ENABLED:-false}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-}
      - API_KEY_REQUIRED=${API_KEY_REQUIRED:-false}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - POLYMARKET_ENABLED=${POLYMARKET_ENABLED:-true}
      - POLYMARKET_FETCH_INTERVAL=${POLYMARKET_FETCH_INTERVAL:-5}
      - POLYMARKET_VOLATILITY_THRESHOLD=${POLYMARKET_VOLATILITY_THRESHOLD:-0.10}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy

  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: unless-stopped
    networks:
      - backend_net
    ports:
      - "1200:1200"
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - CACHE_TYPE=memory
      - CACHE_EXPIRE=300
      # 访问控制（可选）
      - ACCESS_KEY=${RSSHUB_ACCESS_KEY:-}
      # 代理配置（可选）
      - PROXY_URI=${PROXY_URI:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1200"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ainews_frontend
    restart: unless-stopped
    networks:
      - frontend_net
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api/proxy
      - DASHBOARD_INTERNAL_URL=${DASHBOARD_INTERNAL_URL:-http://dashboard:8000}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - dashboard

  # NocoDB - 数据库可视化管理界面
  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    networks:
      - data_net
    ports:
      - "8180:8080"
    volumes:
      - nocodb_data:/usr/app/data
    environment:
      - TZ=Asia/Shanghai
      - NC_DB=pg://nocodb_meta:5432?u=postgres&p=${NOCODB_META_PASSWORD:?请在 .env 中设置 NOCODB_META_PASSWORD}&d=nocodb
      # 禁用遥测
      - NC_DISABLE_TELE=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # NocoDB 元数据存储（PostgreSQL）
  nocodb_meta:
    image: postgres:15-alpine
    container_name: nocodb_meta
    restart: unless-stopped
    networks:
      - data_net
    volumes:
      - nocodb_pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${NOCODB_META_PASSWORD:?请在 .env 中设置 NOCODB_META_PASSWORD}
      - POSTGRES_DB=nocodb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15
    container_name: ainews_postgres
    restart: unless-stopped
    networks:
      - data_net
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ainews
      POSTGRES_USER: ainews
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainews"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  data_net:
    driver: bridge

volumes:
  pgdata:
  nocodb_data:
  nocodb_pgdata:
  trendradar_output:
